kind = "web"
previewPath = "/"
title = "CST Flip Clock"
version = "1.0.0"
id = "artifacts/flip-clock"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 21339

[services.development]
run = "pnpm --filter @workspace/flip-clock run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/flip-clock", "run", "build" ]
publicDir = "artifacts/flip-clock/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "21339"
BASE_PATH = "/"
